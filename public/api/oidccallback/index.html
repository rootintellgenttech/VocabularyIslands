<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (!code) {
    window.location.href = '/login';
    return;
  }

  try {
    //用 code 換 token
    const formData = new URLSearchParams();
    formData.append('grant_type', 'authorization_code');
    formData.append('code', code);
    formData.append('redirect_uri', 'https://englishability.rootadviser.com/api/oidccallback/');
    formData.append('client_id', 'kh_vendor_englishability_a95da8c087d6f9c3f62acc5e22c26f42');
    formData.append('client_secret', '38efe712ebe3b6af5d7365441cf2e4d5b6d3c9dc07aa977f74d8f1c8e6c134d1');

    const tokenRes = await fetch('https://oidc.kh.edu.tw/oauth2/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData.toString()
    });

    const tokenData = await tokenRes.json();
    console.log('[Step 2] token response:', tokenData);

    if (!tokenData.id_token) {
      console.error('[Step 2] 沒有 id_token:', tokenData);
      window.location.href = '/login?error=no_token';
      return;
    }

    //解析 id_token（直接 base64 decode，不用 library）
    const payload = JSON.parse(atob(tokenData.id_token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    console.log('[Step 3] decoded user:', payload);

    //打後端登入 API
    const loginRes = await fetch('/api/students/oidc/oidclogin/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sub: payload.sub,
        kh_profile: {
          fullname: payload.kh_profile?.fullname || '',
          email: payload.kh_profile?.email || ''
        },
        kh_titles: payload.kh_titles || {},
        kh_classes: payload.kh_classes || {}
      })
    });

    const loginData = await loginRes.json();
    console.log('[Step 4] login response:', loginData);

    if (!loginData.token && !loginData.access) {
      console.error('[Step 4] 登入失敗:', loginData);
      window.location.href = '/login?error=login_failed';
      return;
    }

    // 存 token，跳到 home
    localStorage.setItem('accessToken', loginData.token || loginData.access);
    localStorage.setItem('refreshToken', loginData.refresh || loginData.refresh_token || '');
    localStorage.setItem('userRole', loginData.role || 'student');

    window.location.href = '/home';

  } catch (err) {
    console.error('[OIDC Callback] 錯誤:', err);
    window.location.href = '/login?error=exception';
  }
})();
</script>
</body>
</html>
